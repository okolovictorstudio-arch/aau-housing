{% extends 'listings/base.html' %}

{% block content %}

<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px;">
    <div class="auth-card">
        <h1 class="auth-title">Create agent account</h1>
        <p class="auth-sub">List your properties and reach AAU students</p>

        {% if messages %}
        {% for message in messages %}
        <div class="auth-error">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="/accounts/register/">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. victor_agent" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm password</label>
                <input type="password" name="password2" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Create account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/accounts/login/">Log in</a></p>
    </div>
</div>

{% endblock %}
