{% extends 'listings/base.html' %}

{% block content %}
<div class="bg-gray-50 py-16 min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8 md:p-12">
        <div class="text-center mb-8">
            <h2 class="font-sans text-[32px] font-bold text-gray-900 tracking-tight leading-tight mb-2">Forgot Password</h2>
            <p class="font-secondary text-[16px] text-gray-500">Enter your email or phone to receive a code.</p>
        </div>
        
        <form method="POST" action="{% url 'accounts:forgot_password_request' %}" class="flex flex-col gap-4">
            {% csrf_token %}
            <div>
                <input type="email" name="email" required placeholder="Enter your email" class="w-full border border-gray-200 px-4 py-3 rounded bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-secondary text-[16px] transition-all">
            </div>
            
            <button type="submit" class="w-full bg-primary text-white font-sans font-bold text-[16px] px-4 py-3 rounded hover:bg-primaryHover transition-colors mt-2 flex items-center justify-center gap-2">
                Send Verification Code
            </button>
            
            <div class="mt-4 text-center">
                <a href="/accounts/login/" class="font-secondary text-gray-500 hover:text-primary text-[14px] transition-colors"><i class="ph ph-arrow-left"></i> Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
