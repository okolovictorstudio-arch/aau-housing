{% extends 'listings/base.html' %}

{% block content %}

<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px;">
    <div class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Log in to manage your listings</p>

        {% if messages %}
        {% for message in messages %}
        <div class="auth-error">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="/accounts/login/">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Log in</button>
        </form>

        <p class="auth-switch">No account yet? <a href="/accounts/register/">Register as agent</a></p>
    </div>
</div>

{% endblock %}
