{% extends 'listings/base.html' %}

{% block content %}
<div class="bg-gray-50 py-16 min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8 md:p-12 mt-8 mb-8">
        <div class="text-center mb-8">
            <h2 class="font-sans text-[32px] font-bold text-gray-900 tracking-tight leading-tight mb-2">Welcome Back</h2>
            <p class="font-secondary text-[16px] text-gray-500">Sign in to your Cradle account</p>
        </div>

        {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                    <div class="p-3 rounded text-sm font-medium {% if 'error' in message.tags %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="flex flex-col gap-5">
            {% csrf_token %}
            <div>
                <label class="block font-secondary text-gray-700 text-[14px] font-bold mb-2">Username</label>
                <input type="text" name="username" required placeholder="Enter username" class="w-full border border-gray-200 px-4 py-3 rounded bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-secondary text-[16px] transition-all">
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="block font-secondary text-gray-700 text-[14px] font-bold">Password</label>
                    <a href="/forgot-password/" class="font-secondary text-primary hover:text-primaryHover text-[14px] transition-colors">Forgot password?</a>
                </div>
                <input type="password" name="password" required placeholder="Enter password" class="w-full border border-gray-200 px-4 py-3 rounded bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-secondary text-[16px] transition-all">
            </div>
            
            <button type="submit" class="w-full bg-primary text-white font-sans font-bold text-[16px] px-4 py-3 rounded hover:bg-primaryHover transition-colors mt-2 text-center block shadow-sm border border-transparent">
                Log In
            </button>
        </form>



        <div class="mt-8 text-center">
            <p class="font-secondary text-gray-600 text-[14px]">Don't have an account? <a href="/accounts/register/" class="text-primary hover:text-primaryHover font-bold transition-colors">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
