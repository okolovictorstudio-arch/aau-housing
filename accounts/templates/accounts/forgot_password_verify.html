{% extends 'listings/base.html' %}

{% block content %}
<div class="bg-gray-50 py-16 min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8 md:p-12">
        <div class="text-center mb-8">
            <h2 class="font-sans text-[32px] font-bold text-gray-900 tracking-tight leading-tight mb-2">Verify Code</h2>
            <p class="font-secondary text-[16px] text-gray-500">We sent a 6-digit code to {{ email }}</p>
        </div>

        {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                    <div class="p-3 rounded text-sm font-medium {% if 'error' in message.tags %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST" action="{% url 'accounts:forgot_password_verify' %}" class="flex flex-col gap-4">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            
            <div>
                <label class="block font-secondary text-gray-700 text-[14px] font-bold mb-2">6-Digit Code</label>
                <input type="text" name="code" placeholder="123456" maxlength="6" required class="w-full border border-gray-200 px-4 py-3 rounded bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-secondary text-[16px] transition-all text-center tracking-widest font-bold">
            </div>
            
            <div>
                <label class="block font-secondary text-gray-700 text-[14px] font-bold mb-2">New Password</label>
                <input type="password" name="new_password" placeholder="Enter new password" required class="w-full border border-gray-200 px-4 py-3 rounded bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-secondary text-[16px] transition-all">
            </div>
            
            <button type="submit" class="w-full bg-primary text-white font-sans font-bold text-[16px] px-4 py-3 rounded hover:bg-primaryHover transition-colors mt-2 flex items-center justify-center gap-2">
                Reset Password
            </button>
            
            <div class="mt-4 text-center">
                <a href="/accounts/forgot-password/" class="font-secondary text-gray-500 hover:text-primary text-[14px] transition-colors"><i class="ph ph-arrow-left"></i> Try another email</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
